name: MLabs Transcription CI

on:
  push:
    branches: [ main, Development ]
  pull_request:
    branches: [ main, Development ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout pull request head commit
      if: github.event_name == 'pull_request'
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 1

    - name: Checkout branch push commit
      if: github.event_name != 'pull_request'
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install FFmpeg
      run: sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run import checks
      run: |
        python -c "from database.db import init_db; init_db(); print('DB OK')"
        python -c "from audio.processor import check_ffmpeg; print('FFmpeg:', check_ffmpeg())"
        python -c "from transcription.engine import MODELS; print('Models:', list(MODELS.keys()))"
        python -c "from exports.exporter import export_as_txt; print('Exports OK')"
